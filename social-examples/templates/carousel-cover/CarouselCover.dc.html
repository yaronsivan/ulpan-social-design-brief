<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Carousel Cover (4:5)" description="Full-bleed photo + dark scrim + RTL Hebrew headline (≤30 chars) + English subhead + one badge. The cover slide; text sits ON the photo." -->
<helmet>
  <script src="./ds-base.js"></script>
</helmet>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--ub-ink);font-family:var(--font-body);direction:rtl">

  <!-- photo layer: placeholder treatment + optional real photo on top -->
  <div style="position:absolute;inset:0;background:radial-gradient(120% 90% at 70% 18%, #6b5746 0%, #3a2f29 48%, #1c1714 100%)"></div>
  <div style="position:absolute;inset:0;opacity:0.5;background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 9px)"></div>
  <img src="{{ photoUrl }}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" />

  <!-- empty-state hint (hidden once a photo is set; harmless decorative caption) -->
  <div style="position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);text-align:center;color:rgba(255,255,255,0.28);font-size:24px;letter-spacing:0.16em;text-transform:uppercase;pointer-events:none">cover photo</div>

  <!-- bottom scrim for legibility -->
  <div style="position:absolute;left:0;right:0;bottom:0;height:74%;background:linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.55) 38%, rgba(0,0,0,0) 100%)"></div>

  <!-- badge, top corner (RTL → top-right) -->
  <div style="position:absolute;top:64px;right:64px;display:flex;align-items:center;gap:16px">
    {{ levelDot }}
    <span style="display:inline-flex;flex-direction:column;line-height:1.12">
      <span style="font-family:var(--font-display);font-size:28px;font-weight:500;color:var(--ub-cream-pale)">{{ levelHe }}</span>
      <span dir="ltr" style="font-size:15px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,253,250,0.7)">Level {{ level }}</span>
    </span>
  </div>

  <!-- content, bottom -->
  <div style="position:absolute;left:72px;right:72px;bottom:72px;display:flex;flex-direction:column;gap:28px">
    <h1 style="margin:0;font-family:var(--font-display);font-weight:700;font-size:96px;line-height:1.05;color:var(--ub-cream-pale);text-wrap:balance">{{ headline }}</h1>
    <p dir="ltr" style="margin:0;font-family:var(--font-serif);font-style:italic;font-size:46px;line-height:1.25;color:rgba(255,253,250,0.86);text-wrap:pretty">{{ subhead }}</p>

    <!-- brand lockup -->
    <div style="display:flex;align-items:center;gap:18px;margin-top:14px;padding-top:30px;border-top:1.5px solid rgba(255,253,250,0.2)">
      <img src="../../assets/logos/aleph-icon-color.png" alt="" style="width:56px;height:auto;display:block" />
      <span style="display:inline-flex;flex-direction:column;line-height:1.1">
        <span style="font-family:var(--font-display);font-weight:700;font-size:36px;color:var(--ub-cream-pale)">{{ brandHe }}</span>
        <span dir="ltr" style="font-size:16px;font-weight:500;letter-spacing:0.04em;color:rgba(255,253,250,0.7);margin-top:3px">{{ brandTag }}</span>
      </span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1080, &quot;height&quot;: 1350 },
  &quot;headline&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;דִּירָה בְּחִינָּם?!&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;subhead&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;A free apartment?!&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;level&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;A0&quot;,&quot;A1&quot;,&quot;A2&quot;,&quot;B1&quot;,&quot;B2&quot;,&quot;C1&quot;], &quot;default&quot;: &quot;B1&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;product&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;aktuali&quot;,&quot;magazine&quot;], &quot;default&quot;: &quot;aktuali&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;photoUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const CEFR = {
      A0:{c:'#1A9461',n:0}, A1:{c:'#54A742',n:1}, A2:{c:'#9FB52E',n:2},
      B1:{c:'#FFC60B',n:3}, B2:{c:'#F2913B',n:4}, C1:{c:'#F0586D',n:5},
    };
    const level = this.props.level || 'B1';
    const m = CEFR[level] || CEFR.B1;
    const product = this.props.product || 'aktuali';
    const brand = product === 'magazine'
      ? { he: '\u05DE\u05D2\u05D6\u05D9\u05DF \u05D4\u05D1\u05D9\u05EA', tag: 'ULPAN BAYIT MAGAZINE' }
      : { he: '\u05D0\u05E7\u05D8\u05D5\u05D0\u05DC\u05D9', tag: 'The daily paper in easy Hebrew' };
    const levelDot = React.createElement('span', { style: {
      display:'inline-flex', alignItems:'center', justifyContent:'center',
      width:60, height:60, borderRadius:'50%', background:m.c, color:'#fff',
      fontWeight:700, fontSize:25, boxShadow:'0 2px 10px rgba(0,0,0,0.35)'
    } }, level);
    return {
      level,
      levelDot,
      levelColor: m.c,
      levelHe: '\u05E8\u05B8\u05DE\u05B8\u05D4 ' + m.n,
      headline: this.props.headline ?? '\u05D3\u05B4\u05BC\u05D9\u05E8\u05B8\u05D4 \u05D1\u05B0\u05D7\u05B4\u05D9\u05E0\u05B8\u05BC\u05DD?!',
      subhead: this.props.subhead ?? 'A free apartment?!',
      photoUrl: this.props.photoUrl || '',
      brandHe: brand.he,
      brandTag: brand.tag,
    };
  }
}
</script>
</body>
</html>
