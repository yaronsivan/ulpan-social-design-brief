<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Idiom-Reveal Video Frame (9:16)" description="Signature expressions format. Three beat states: literal (greyed 'bait') → reveal (real meaning, coral/bold) → example. Register-pill badge, Magazine footer." -->
<helmet>
  <script src="./ds-base.js"></script>
</helmet>
<div style="position:relative;width:1080px;height:1920px;overflow:hidden;background:var(--ub-cream);font-family:var(--font-body);direction:rtl;display:flex;flex-direction:column">

  <!-- top bar: register pill + format label -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:72px 72px 0">
    {{ regPill }}
    <span dir="ltr" style="font-size:18px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--ub-coral)">{{ stateLabel }}</span>
  </div>

  <!-- center -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:64px 88px;gap:56px">

    <!-- the idiom term is always shown; scales by state -->
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center">
      <sc-if value="{{ isLiteral }}" hint-placeholder-val="{{ true }}">
        <h1 style="margin:0;font-family:var(--font-display);font-weight:700;font-size:104px;line-height:1.08;color:var(--fg)">{{ idiom }}</h1>
      </sc-if>
      <sc-if value="{{ notLiteral }}" hint-placeholder-val="{{ false }}">
        <h1 style="margin:0;font-family:var(--font-display);font-weight:700;font-size:64px;line-height:1.08;color:var(--fg)">{{ idiom }}</h1>
      </sc-if>
      <span dir="ltr" style="font-family:var(--font-body);font-style:italic;font-size:34px;color:var(--fg-faint)">{{ idiomTranslit }}</span>
    </div>

    <sc-if value="{{ isLiteral }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;gap:18px;align-items:center;opacity:0.6">
        <span style="font-family:var(--font-display);font-size:64px;font-weight:400;color:var(--fg-faint)">{{ literalHe }}</span>
        <span dir="ltr" style="font-family:var(--font-serif);font-style:italic;font-size:42px;color:var(--fg-faint)">{{ literalEn }}</span>
      </div>
    </sc-if>

    <sc-if value="{{ isReveal }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;gap:22px;align-items:center">
        <span dir="ltr" style="font-size:20px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ub-coral)">Really means</span>
        <span style="font-family:var(--font-display);font-size:82px;font-weight:700;line-height:1.1;color:var(--ub-coral);text-wrap:balance">{{ realHe }}</span>
        <span dir="ltr" style="font-family:var(--font-serif);font-style:italic;font-size:46px;line-height:1.3;color:var(--fg);text-wrap:pretty">{{ realEn }}</span>
      </div>
    </sc-if>

    <sc-if value="{{ isExample }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;gap:22px;align-items:center;background:var(--ub-cream-pale);border:1.5px solid var(--ub-rule-soft);border-radius:var(--r-lg);padding:48px 56px;box-shadow:var(--shadow-card)">
        <span dir="ltr" style="font-size:20px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ub-teal-deep)">In use</span>
        <span style="font-family:var(--font-display);font-size:62px;font-weight:500;line-height:1.18;color:var(--fg);text-wrap:balance">{{ exampleHe }}</span>
        <span dir="ltr" style="font-family:var(--font-serif);font-style:italic;font-size:40px;line-height:1.3;color:var(--fg-muted);text-wrap:pretty">{{ exampleEn }}</span>
      </div>
    </sc-if>
  </div>

  <!-- footer lockup -->
  <div style="display:flex;align-items:center;gap:18px;padding:0 72px 88px">
    <img src="../../assets/logos/aleph-icon-color.png" alt="" style="width:54px;height:auto" />
    <span style="display:inline-flex;flex-direction:column;line-height:1.1">
      <span style="font-family:var(--font-display);font-weight:700;font-size:36px;color:var(--fg)">{{ brandHe }}</span>
      <span dir="ltr" style="font-size:18px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-faint);margin-top:3px">{{ brandTag }}</span>
    </span>
    <span dir="ltr" style="margin-right:auto;font-size:22px;color:var(--fg-faint)">{{ handle }}</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1080, &quot;height&quot;: 1920 },
  &quot;state&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;literal&quot;,&quot;reveal&quot;,&quot;example&quot;], &quot;default&quot;: &quot;literal&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;register&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;neutral&quot;,&quot;colloquial&quot;,&quot;slang&quot;,&quot;crude&quot;], &quot;default&quot;: &quot;slang&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;idiom&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;דָּחַף אֶת הָאַף&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;idiomTranslit&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;da·chaf et ha·af&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;literalEn&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;\&quot;pushed his nose in\&quot;?&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;realEn&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;butted in / stuck his nose in uninvited&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const state = p.state || 'literal';
    const REG = {
      neutral:{c:'#00B0C6',he:'\u05E0\u05B5\u05D9\u05D8\u05B0\u05E8\u05B8\u05DC\u05B4\u05D9',en:'Neutral'},
      colloquial:{c:'#F4B609',he:'\u05D3\u05B4\u05BC\u05D1\u05BC\u05D5\u05BC\u05E8\u05B4\u05D9',en:'Colloquial'},
      slang:{c:'#F0586D',he:'\u05E1\u05B0\u05DC\u05B6\u05E0\u05D2',en:'Slang'},
      crude:{c:'#E36A46',he:'\u05D2\u05B7\u05BC\u05E1',en:'Crude'},
    };
    const reg = REG[p.register || 'slang'] || REG.slang;
    const isLiteral = state === 'literal', isReveal = state === 'reveal', isExample = state === 'example';
    const regPill = React.createElement('span', { style: {
      display:'inline-flex', alignItems:'center', gap:12, padding:'13px 28px',
      borderRadius:999, background:reg.c, color:'#fff', boxShadow:'var(--shadow-sm)'
    } },
      React.createElement('span', { style:{ fontFamily:'var(--font-display)', fontSize:30, fontWeight:500 } }, reg.he),
      React.createElement('span', { dir:'ltr', style:{ fontSize:16, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase', opacity:0.85 } }, reg.en)
    );
    return {
      isLiteral, isReveal, isExample, notLiteral: !isLiteral,
      regPill,
      stateLabel: isLiteral ? 'Wait for it\u2026' : (isReveal ? 'Reveal' : 'Example'),
      idiom: p.idiom ?? '\u05D3\u05B8\u05BC\u05D7\u05B7\u05E3 \u05D0\u05B6\u05EA \u05D4\u05B8\u05D0\u05B7\u05E3',
      idiomTranslit: p.idiomTranslit ?? 'da\u00b7chaf et ha\u00b7af',
      literalHe: p.literalHe ?? '\u201C\u05D3\u05B8\u05BC\u05D7\u05B7\u05E3 \u05D0\u05B6\u05EA \u05D4\u05B8\u05D0\u05B7\u05E3\u201D?',
      literalEn: p.literalEn ?? '"pushed his nose in"?',
      realHe: p.realHe ?? '\u05D4\u05B4\u05EA\u05B0\u05E2\u05B8\u05E8\u05B5\u05D1 \u05D1\u05B0\u05DC\u05B4\u05D9 \u05E9\u05B6\u05D1\u05B4\u05BC\u05E7\u05B0\u05E9\u05D5\u05BC',
      realEn: p.realEn ?? 'butted in / stuck his nose in uninvited',
      exampleHe: p.exampleHe ?? '\u05D4\u05B4\u05D9\u05D0 \u05D3\u05B8\u05BC\u05D7\u05B2\u05E4\u05B8\u05D4 \u05D0\u05B6\u05EA \u05D4\u05B8\u05D0\u05B7\u05E3 \u05DC\u05B7\u05E9\u05B4\u05BC\u05D9\u05D7\u05B8\u05D4 \u05E9\u05B6\u05BC\u05DC\u05B8\u05E0\u05D5\u05BC.',
      exampleEn: p.exampleEn ?? 'She butted into our conversation.',
      brandHe: '\u05DE\u05D2\u05D6\u05D9\u05DF \u05D4\u05D1\u05D9\u05EA', brandTag: 'ULPAN BAYIT MAGAZINE',
      handle: p.handle ?? '@ulpan.magazine',
    };
  }
}
</script>
</body>
</html>
