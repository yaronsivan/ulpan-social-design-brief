<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Carousel Interior (4:5)" description="Solid warm panel (never photo) for legible niqqud. Variants: point (HE line ≤45 chars + EN), idiom (muted literal → bold real), CTA. One badge per slide." -->
<helmet>
  <script src="./ds-base.js"></script>
</helmet>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--ub-cream);font-family:var(--font-body);direction:rtl;display:flex;flex-direction:column">

  <!-- top accent rule -->
  <div style="height:14px;background:linear-gradient(to left, var(--ub-teal) 0 33.3%, var(--ub-gold) 33.3% 66.6%, var(--ub-coral) 66.6% 100%)"></div>

  <!-- badge row -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:56px 72px 0">
    <sc-if value="{{ isCefr }}" hint-placeholder-val="{{ true }}">
      <span style="display:inline-flex;align-items:center;gap:16px">
        {{ levelDot }}
        <span style="display:inline-flex;flex-direction:column;line-height:1.12">
          <span style="font-family:var(--font-display);font-size:27px;font-weight:500;color:var(--fg)">{{ levelHe }}</span>
          <span dir="ltr" style="font-size:14px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-faint)">Level {{ level }}</span>
        </span>
      </span>
    </sc-if>
    <sc-if value="{{ isRegister }}" hint-placeholder-val="{{ false }}">
      {{ regPill }}
    </sc-if>
    <span dir="ltr" style="font-size:22px;font-weight:700;color:var(--ub-coral);letter-spacing:0.04em">{{ slideNo }}</span>
  </div>

  <!-- body -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:48px 96px;gap:34px">

    <sc-if value="{{ isPoint }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;gap:34px;align-items:center">
        <h2 style="margin:0;font-family:var(--font-display);font-weight:700;font-size:84px;line-height:1.1;color:var(--fg);text-wrap:balance">{{ he }}</h2>
        <p dir="ltr" style="margin:0;font-family:var(--font-serif);font-style:italic;font-size:44px;line-height:1.3;color:var(--fg-muted);text-wrap:pretty">{{ en }}</p>
      </div>
    </sc-if>

    <sc-if value="{{ isIdiom }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;gap:48px;align-items:center;width:100%">
        <div style="display:flex;flex-direction:column;gap:14px;align-items:center">
          <h2 style="margin:0;font-family:var(--font-display);font-weight:700;font-size:88px;line-height:1.08;color:var(--fg)">{{ idiom }}</h2>
          <span dir="ltr" style="font-family:var(--font-body);font-style:italic;font-size:30px;color:var(--fg-faint)">{{ idiomTranslit }}</span>
        </div>
        <div style="width:100%;height:1.5px;background:var(--ub-rule)"></div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center;opacity:0.6">
          <span style="font-family:var(--font-display);font-size:48px;color:var(--fg-faint);font-weight:400">{{ literalHe }}</span>
          <span dir="ltr" style="font-family:var(--font-serif);font-style:italic;font-size:34px;color:var(--fg-faint)">{{ literalEn }}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
          <span style="font-family:var(--font-display);font-size:60px;font-weight:700;color:var(--ub-coral)">{{ realHe }}</span>
          <span dir="ltr" style="font-family:var(--font-serif);font-style:italic;font-size:38px;color:var(--fg)">{{ realEn }}</span>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isCta }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;gap:40px;align-items:center">
        <img src="../../assets/logos/aleph-icon-color.png" alt="" style="width:128px;height:auto" />
        <h2 style="margin:0;font-family:var(--font-display);font-weight:700;font-size:80px;line-height:1.1;color:var(--fg);text-wrap:balance">{{ ctaHe }}</h2>
        <p dir="ltr" style="margin:0;font-family:var(--font-serif);font-style:italic;font-size:42px;color:var(--fg-muted);text-wrap:pretty">{{ ctaEn }}</p>
        <span style="display:inline-flex;align-items:center;gap:14px;padding:20px 44px;border-radius:999px;background:var(--ub-coral);color:#fff;font-size:34px;font-weight:700;box-shadow:var(--shadow-md)">{{ ctaButton }}</span>
      </div>
    </sc-if>
  </div>

  <!-- footer lockup -->
  <div style="display:flex;align-items:center;gap:16px;padding:0 72px 56px;justify-content:flex-start">
    <img src="../../assets/logos/aleph-icon-color.png" alt="" style="width:44px;height:auto" />
    <span style="font-family:var(--font-display);font-weight:700;font-size:30px;color:var(--fg)">{{ brandHe }}</span>
    <span dir="ltr" style="font-size:20px;color:var(--fg-faint);margin-right:auto">{{ handle }}</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1080, &quot;height&quot;: 1350 },
  &quot;variant&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;point&quot;,&quot;idiom&quot;,&quot;cta&quot;], &quot;default&quot;: &quot;point&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;badgeType&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;cefr&quot;,&quot;register&quot;], &quot;default&quot;: &quot;cefr&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;level&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;A0&quot;,&quot;A1&quot;,&quot;A2&quot;,&quot;B1&quot;,&quot;B2&quot;,&quot;C1&quot;], &quot;default&quot;: &quot;B1&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;register&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;neutral&quot;,&quot;colloquial&quot;,&quot;slang&quot;,&quot;crude&quot;], &quot;default&quot;: &quot;slang&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;product&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;aktuali&quot;,&quot;magazine&quot;], &quot;default&quot;: &quot;aktuali&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;he&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;אֶחָד מִכָּל 5 קוֹנִים יָכוֹל לִזְכּוֹת בְּדִירָה שְׁלֵמָה — בְּחִינָּם.&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;en&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;1 in 5 buyers can win a whole apartment — for free.&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;slideNo&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;02&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const variant = p.variant || 'point';
    const CEFR = { A0:{c:'#1A9461',n:0},A1:{c:'#54A742',n:1},A2:{c:'#9FB52E',n:2},B1:{c:'#FFC60B',n:3},B2:{c:'#F2913B',n:4},C1:{c:'#F0586D',n:5} };
    const REG = {
      neutral:{c:'#00B0C6',he:'\u05E0\u05B5\u05D9\u05D8\u05B0\u05E8\u05B8\u05DC\u05B4\u05D9',en:'Neutral'},
      colloquial:{c:'#F4B609',he:'\u05D3\u05B4\u05BC\u05D1\u05BC\u05D5\u05BC\u05E8\u05B4\u05D9',en:'Colloquial'},
      slang:{c:'#F0586D',he:'\u05E1\u05B0\u05DC\u05B6\u05E0\u05D2',en:'Slang'},
      crude:{c:'#E36A46',he:'\u05D2\u05B7\u05BC\u05E1',en:'Crude'},
    };
    const level = p.level || 'B1';
    const m = CEFR[level] || CEFR.B1;
    const badgeType = p.badgeType || (variant === 'idiom' ? 'register' : 'cefr');
    const reg = REG[p.register || 'slang'] || REG.slang;
    const product = p.product || 'aktuali';
    const brand = product === 'magazine'
      ? { he:'\u05DE\u05D2\u05D6\u05D9\u05DF \u05D4\u05D1\u05D9\u05EA', handle:'@ulpan.magazine' }
      : { he:'\u05D0\u05E7\u05D8\u05D5\u05D0\u05DC\u05D9', handle:'@aktuali' };
    const levelDot = React.createElement('span', { style: {
      display:'inline-flex', alignItems:'center', justifyContent:'center',
      width:58, height:58, borderRadius:'50%', background:m.c, color:'#fff',
      fontWeight:700, fontSize:24
    } }, level);
    const regPill = React.createElement('span', { style: {
      display:'inline-flex', alignItems:'center', gap:12, padding:'12px 26px',
      borderRadius:999, background:reg.c, color:'#fff', boxShadow:'var(--shadow-sm)'
    } },
      React.createElement('span', { style:{ fontFamily:'var(--font-display)', fontSize:28, fontWeight:500 } }, reg.he),
      React.createElement('span', { dir:'ltr', style:{ fontSize:15, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase', opacity:0.85 } }, reg.en)
    );
    return {
      isPoint: variant === 'point', isIdiom: variant === 'idiom', isCta: variant === 'cta',
      isCefr: badgeType === 'cefr', isRegister: badgeType === 'register',
      level, levelDot, regPill, levelHe: '\u05E8\u05B8\u05DE\u05B8\u05D4 ' + m.n,
      slideNo: p.slideNo ?? '02',
      he: p.he ?? '\u05D0\u05B6\u05D7\u05B8\u05D3 \u05DE\u05B4\u05DB\u05B8\u05BC\u05DC 5 \u05E7\u05D5\u05B9\u05E0\u05B4\u05D9\u05DD \u05D9\u05B8\u05DB\u05D5\u05B9\u05DC \u05DC\u05B4\u05D6\u05B0\u05DB\u05D5\u05B9\u05EA \u05D1\u05B0\u05D3\u05B4\u05D9\u05E8\u05B8\u05D4 \u05E9\u05B0\u05DC\u05B5\u05DE\u05B8\u05D4 \u2014 \u05D1\u05B0\u05D7\u05B4\u05D9\u05E0\u05B8\u05BC\u05DD.',
      en: p.en ?? '1 in 5 buyers can win a whole apartment \u2014 for free.',
      idiom: p.idiom ?? '\u05D3\u05B8\u05BC\u05D7\u05B7\u05E3 \u05D0\u05B6\u05EA \u05D4\u05B8\u05D0\u05B7\u05E3',
      idiomTranslit: p.idiomTranslit ?? 'da\u00b7chaf et ha\u00b7af',
      literalHe: p.literalHe ?? '\u201C\u05D3\u05B8\u05BC\u05D7\u05B7\u05E3 \u05D0\u05B6\u05EA \u05D4\u05B8\u05D0\u05B7\u05E3\u201D',
      literalEn: p.literalEn ?? '"pushed his nose in"',
      realHe: p.realHe ?? '\u05D4\u05B4\u05EA\u05B0\u05E2\u05B8\u05E8\u05B5\u05D1 \u05D1\u05B0\u05DC\u05B4\u05D9 \u05E9\u05B6\u05D1\u05B4\u05BC\u05E7\u05B0\u05E9\u05D5\u05BC',
      realEn: p.realEn ?? 'butted in / stuck his nose in uninvited',
      ctaHe: p.ctaHe ?? '\u05E8\u05D5\u05B9\u05E6\u05B4\u05D9\u05DD \u05E2\u05D5\u05B9\u05D3?',
      ctaEn: p.ctaEn ?? 'Want more? News in easy Hebrew. Follow.',
      ctaButton: p.ctaButton ?? '\u05E2\u05B4\u05E7\u05B0\u05D1\u05D5\u05BC \u00b7 Follow',
      brandHe: brand.he, handle: p.handle ?? brand.handle,
    };
  }
}
</script>
</body>
</html>
