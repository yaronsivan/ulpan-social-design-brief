<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Editor's-Note Snippet (4:5)" description="A short pull-quote from the editor's note in Yaron's editorial voice + issue theme tag + attribution (with photo) + CTA. Magazine register on cream-warm: big serif quote, gold quotation flourish, teal-deep accents." -->
<helmet>
  <script src="./ds-base.js"></script>
</helmet>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--ub-cream-warm);font-family:var(--font-body);direction:rtl;display:flex;flex-direction:column;padding:64px 80px 56px">

  <div style="display:flex;align-items:baseline;justify-content:space-between">
    <span dir="ltr" style="font-size:22px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ub-gold-deep);white-space:nowrap">{{ kicker }}</span>
    <span style="font-family:var(--font-display);font-size:36px;font-weight:700;color:var(--ub-teal-deep)">{{ brandHe }}</span>
  </div>
  <div style="height:1.5px;background:var(--ub-teal-deep);opacity:0.28;margin-top:20px"></div>

  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:30px">
    <span style="font-family:var(--font-serif);font-weight:700;font-size:150px;line-height:0.8;color:var(--ub-gold);height:90px;overflow:hidden">”</span>

    <blockquote style="margin:0;font-family:var(--font-display);font-weight:500;font-size:84px;line-height:1.18;color:var(--ub-ink-soft);text-wrap:balance">{{ quoteHe }}</blockquote>
    <p dir="ltr" style="margin:0;max-width:880px;font-family:var(--font-serif);font-style:italic;font-size:42px;line-height:1.3;color:var(--ub-ink-muted);text-wrap:pretty">{{ quoteEn }}</p>

    <!-- attribution -->
    <div style="display:flex;align-items:center;gap:22px;margin-top:12px">
      <img src="../../assets/logos/yaron.jpg" alt="" style="width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--ub-gold);box-shadow:var(--shadow-sm)" />
      <span style="display:inline-flex;flex-direction:column;line-height:1.2">
        <span style="font-family:var(--font-display);font-size:40px;font-weight:700;color:var(--ub-teal-deep)">{{ authorHe }}</span>
        <span dir="ltr" style="font-size:24px;font-weight:600;letter-spacing:0.04em;color:var(--ub-ink-faint)">{{ authorEn }}</span>
      </span>
      <span style="margin-right:auto;display:inline-flex;align-items:center;gap:12px;padding:12px 26px;border-radius:var(--r-pill);background:var(--ub-teal-mist)">
        <span style="font-family:var(--font-display);font-size:30px;font-weight:500;color:var(--ub-teal-deep)">{{ themeTag }}</span>
      </span>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;padding-top:24px;border-top:1.5px solid var(--ub-rule)">
    <span dir="ltr" style="font-size:24px;font-weight:500;color:var(--ub-ink-faint)">{{ handle }}</span>
    <div style="display:inline-flex;align-items:center;gap:14px;padding:18px 40px;border-radius:var(--r-pill);background:var(--ub-teal-deep);box-shadow:var(--shadow-md)">
      <span style="font-family:var(--font-display);font-size:34px;font-weight:500;color:var(--ub-cream-pale)">{{ ctaHe }}</span>
      <span dir="ltr" style="font-size:24px;font-weight:700;color:rgba(255,253,250,0.78)">{{ ctaEn }}</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1080, &quot;height&quot;: 1350 },
  &quot;kicker&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Editor's note · Issue 07&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;quoteHe&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;אֵין לָנוּ הַרְבֵּה מַיִם — אֲבָל יֵשׁ לָנוּ הַרְבֵּה מִילִּים.&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;quoteEn&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;We don't have much water — but we have plenty of words for it.&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;authorHe&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;יָרוֹן&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;authorEn&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Yaron · Editor&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;themeTag&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;גִּלָּיוֹן 07 · מַיִם&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;ctaHe&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;קראו את המכתב&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;ctaEn&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Read the note&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;handle&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;@ulpan.magazine&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    return {
      kicker: p.kicker ?? "Editor's note \u00b7 Issue 07",
      quoteHe: p.quoteHe ?? '\u05D0\u05B5\u05D9\u05DF \u05DC\u05B8\u05E0\u05D5\u05BC \u05D4\u05B7\u05E8\u05B0\u05D1\u05B5\u05BC\u05D4 \u05DE\u05B7\u05D9\u05B4\u05DD \u2014 \u05D0\u05B2\u05D1\u05B8\u05DC \u05D9\u05B5\u05E9\u05B6\u05C1 \u05DC\u05B8\u05E0\u05D5\u05BC \u05D4\u05B7\u05E8\u05B0\u05D1\u05B5\u05BC\u05D4 \u05DE\u05B4\u05D9\u05DC\u05B4\u05BC\u05D9\u05DD.',
      quoteEn: p.quoteEn ?? "We don't have much water \u2014 but we have plenty of words for it.",
      authorHe: p.authorHe ?? '\u05D9\u05B8\u05E8\u05D5\u05B9\u05DF',
      authorEn: p.authorEn ?? 'Yaron \u00b7 Editor',
      themeTag: p.themeTag ?? '\u05D2\u05B4\u05BC\u05DC\u05B8\u05BC\u05D9\u05D5\u05B9\u05DF 07 \u00b7 \u05DE\u05B7\u05D9\u05B4\u05DD',
      ctaHe: p.ctaHe ?? '\u05E7\u05E8\u05D0\u05D5 \u05D0\u05EA \u05D4\u05DE\u05DB\u05EA\u05D1',
      ctaEn: p.ctaEn ?? 'Read the note',
      handle: p.handle ?? '@ulpan.magazine',
      brandHe: '\u05DE\u05D2\u05D6\u05D9\u05DF \u05D4\u05D1\u05D9\u05EA',
    };
  }
}
</script>
</body>
</html>
